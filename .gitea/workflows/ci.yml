name: CI Pipeline

on:
  push:
    branches: [main]

env:
  JAVA_HOME: /home/tooling/.sdkman/candidates/java/21.0.5-tem

jobs:
  unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: export PATH="$JAVA_HOME/bin:$PATH" && cd backend && mvn test -DexcludedGroups=e2e,playwright

  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run tests and SonarQube analysis
        env:
          SONAR_URL: http://sonarqube:9000
        run: >
          export PATH="$JAVA_HOME/bin:$PATH" &&
          cd backend &&
          mvn verify sonar:sonar
          -Dsonar.login=admin
          -Dsonar.password=sonarpass

  e2e-tests:
    name: E2E Tests (API + Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: library
          POSTGRES_USER: library
          POSTGRES_PASSWORD: library
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run all E2E tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/library
          DATABASE_USER: library
          DATABASE_PASSWORD: library
        run: export PATH="$JAVA_HOME/bin:$PATH" && cd backend && mvn test -Pci
