name: CI Pipeline

on:
  push:
    branches: [main]

env:
  JAVA_HOME: /home/tooling/.sdkman/candidates/java/21.0.5-tem
  PATH: /home/tooling/.sdkman/candidates/java/21.0.5-tem/bin:/home/tooling/.sdkman/candidates/maven/current/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: cd backend && mvn test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests
        run: cd backend && mvn test -Pci
