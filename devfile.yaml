schemaVersion: 2.2.0
metadata:
  name: devspaces-claude-verify
  description: Workspace with VS Code, Gitea, and Claude Code (Verification Mode)
  version: 1.0.6

attributes:
  controller.devfile.io/default-editor: che-incubator/che-code/latest

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 4G
      mountSources: true
      env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /home/user/gcp-secret/auth.json
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          value: "your-gcp-project-id"
        - name: ANTHROPIC_VERTEX_REGION
          value: "global"

  - name: gitea-data
    volume:
      size: 2Gi

  - name: gitea
    container:
      image: quay.io/gpte-devops-automation/gitea:1.19.0
      memoryLimit: 1G
      endpoints:
        - name: gitea-web
          targetPort: 3000
          exposure: public
          protocol: http
      env:
        - name: GITEA__database__DB_TYPE
          value: sqlite3
        - name: GITEA__server__HTTP_PORT
          value: "3000"
        - name: GITEA__server__HTTP_ADDR
          value: "0.0.0.0"
      volumeMounts:
        - name: gitea-data
          path: /data

commands:
  - id: install-claude
    exec:
      component: tools
      commandLine: "npm install -g @anthropic-ai/claude-code"
      workingDir: /projects

events:
  postStart:
    - install-claude