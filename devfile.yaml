schemaVersion: 2.2.0
metadata:
  name: devspaces-claude-verify
  description: Workspace with VS Code, Gitea, and Claude Code (Verification Mode)
  version: 1.0.6

attributes:
  controller.devfile.io/default-editor: che-incubator/che-code/latest

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 4G
      mountSources: true
      endpoints:
        - name: gitea-web
          targetPort: 3000
          exposure: public
          protocol: http
      env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /home/user/gcp-secret/auth.json
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          value: "itpc-gcp-global-revenue-claude"
        - name: ANTHROPIC_VERTEX_REGION
          value: "global"

  - name: postgresql
    container:
      image: postgres:16
      memoryLimit: 512M
      env:
        - name: POSTGRES_DB
          value: library
        - name: POSTGRES_USER
          value: library
        - name: POSTGRES_PASSWORD
          value: library
      endpoints:
        - name: postgres
          targetPort: 5432
          exposure: internal

commands:
  - id: install-claude
    exec:
      component: tools
      commandLine: "npm install -g @anthropic-ai/claude-code"
      workingDir: /projects

  - id: setup-gitea
    exec:
      component: tools
      commandLine: "bash /projects/aidd-demo/setup-gitea.sh"
      workingDir: /projects/aidd-demo

events:
  postStart:
    - install-claude
