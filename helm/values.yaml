# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts
  repoUrl: "https://github.com/mastanak3/aidd-demo.git"
  revision: "main"
  basePath: "helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Operator Installation ---
  devspaces:
    enabled: true
    name: devspaces
    namespace: openshift-devspaces
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic
    allNamespaces: true  # DevWorkspace requires AllNamespaces mode

# ============================================================
# ISBN Lookup Service - External service for workshop problem 3
# ============================================================
isbn_service:
  enabled: true
  name: isbn-service
  namespace: isbn-service
  build:
    gitUri: "https://github.com/mastanak3/aidd-demo.git"
    gitRef: "prob3"
    contextDir: "isbn-service"
  port: 8080
  replicas: 1
  route:
    enabled: true

# ============================================================
# DevSpaces Custom Image - Pre-built tools image with Playwright
# ============================================================
devspaces_image:
  enabled: true
  name: devspaces-tools
  namespace: devspaces-tools
  build:
    gitUri: "https://github.com/mastanak3/aidd-demo.git"
    gitRef: "main"
    contextDir: "devspaces-image"

# ============================================================
# Dev Space Instance - Created after operators are installed
# ============================================================
devspaces_instance:
  enabled: true
  name: devspaces
  namespace: openshift-devspaces
  devEnvironments:
    startTimeoutSeconds: 300
    secondsOfRunBeforeIdling: -1
    maxNumberOfWorkspacesPerUser: -1
    maxNumberOfRunningWorkspacesPerUser: -1
    secondsOfInactivityBeforeIdling: 1800

# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: ""
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
