{{- if and .Values.isbn_service.enabled .Values.isbn_service.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.isbn_service.name }}
  namespace: {{ .Values.isbn_service.namespace }}
  labels:
    app: {{ .Values.isbn_service.name }}
spec:
  to:
    kind: Service
    name: {{ .Values.isbn_service.name }}
    weight: 100
  port:
    targetPort: {{ .Values.isbn_service.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
