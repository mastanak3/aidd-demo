{{- if .Values.devspaces_image.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-puller-binding
  namespace: {{ .Values.devspaces_image.namespace }}
  labels:
    app: {{ .Values.devspaces_image.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - kind: Group
    name: system:serviceaccounts
    apiGroup: rbac.authorization.k8s.io
{{- end }}
